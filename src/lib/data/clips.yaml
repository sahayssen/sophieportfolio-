clips:
  - slug: doctor
    title: A Texas Doctor Is Suing A Doctor for Helping his Girlfriend get an Abortion
    image: /photos/doctor.png
    imageAlt: A doctor examining a patient in a clinic
    description: A Texas man named Jerry Rodriguez is suing a California doctor in federal court for helping his girlfriend get an abortion.Because Rodriguez filed his claim in federal court, his case could become a new stress test for “shield laws,” which pro-choice states use to protect abortion providers and patients from legal attacks.

  - slug: herbal
    title: Herbal Abortions Are Making A Comeback in the Age of Abortion Bans
    image: /photos/herbal.png 
    imageAlt: pile of herbs against a grey background
    description: In the face of shrinking reproductive rights, some people are seeking out herbal abortions. While it’s nice to think that a leafy green or flowery tea could provide an escape from a labyrinthine legal and medical system, the reality is more complicated. Herbal abortifacients can not only lead to serious illness, but they might not work at all.

  - slug: campus
    title: This Controversial Report Could Change Reproductive Rights in America
    image: /photos/campus.jpg
    imageAlt: A picture of birth control pills. 
    description: A non-peer-reviewed “junk science” study, published by conservative think tank EPPC, is emboldening the movement to ban abortion pills. Despite these serious flaws, HHS Secretary Robert F. Kennedy Jr. used the study to launch an FDA investigation into medication abortion.