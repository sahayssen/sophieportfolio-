profile:
  name: About Me 
  tagline: Sophie is a New York based journalist and fact checker covering education, youth, and activism. Her reporting has appeared in Prism, Teen Vogue, Bitch Media, and Refinery29. She previously worked for Mother Jones as an Editorial Fellow. Currently she is pursuing an M.A. in journalism at CUNY Newmark. 
